<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>STL Coffee Spot | Best Coffee Shops in St. Louis, MO</title>
    <meta name="description" content="Discover the best local coffee shops, roasters, and cafes across St. Louis — from Soulard and The Loop to Clayton, Kirkwood, Maplewood, and beyond. Your ultimate STL coffee guide." />
    <meta name="keywords" content="best coffee shops St Louis, STL coffee, coffee shops near me St Louis, specialty coffee St Louis, St Louis roasters, coffee Soulard, coffee Clayton, coffee Maplewood, coffee Central West End, coffee Kirkwood, coffee The Loop" />
    <link rel="canonical" href="https://stlcoffeespot.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="STL Coffee Spot | Best Coffee Shops in St. Louis" />
    <meta property="og:description" content="Your curated guide to the best coffee shops, roasters, and cafes across the St. Louis metro area." />
    <meta property="og:url" content="https://stlcoffeespot.com/" />
    <meta property="og:image" content="https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?q=80&w=1200&auto=format&fit=crop" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="STL Coffee Spot | Best Coffee Shops in St. Louis" />
    <meta name="twitter:description" content="Your curated guide to the best coffee shops, roasters, and cafes across the St. Louis metro area." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?q=80&w=1200&auto=format&fit=crop" />

    <!-- Geo targeting -->
    <meta name="geo.region" content="US-MO" />
    <meta name="geo.placename" content="St. Louis" />
    <meta name="geo.position" content="38.6270;-90.1994" />

    <!-- Schema.org structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "STL Coffee Spot",
      "url": "https://stlcoffeespot.com",
      "description": "Curated guide to the best coffee shops in St. Louis, MO",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://stlcoffeespot.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <!-- Netlify form detection -->
    <form name="shop-submission" data-netlify="true" hidden>
      <input name="shopName" /><input name="address" /><input name="website" /><textarea name="notes"></textarea>
    </form>
    <form name="contact" data-netlify="true" hidden>
      <input name="name" /><input name="email" /><textarea name="message"></textarea>
    </form>
    <form name="claim-shop" data-netlify="true" hidden>
      <input name="shopName" /><input name="shopAddress" /><input name="ownerName" /><input name="email" /><input name="phone" /><textarea name="message"></textarea>
    </form>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
